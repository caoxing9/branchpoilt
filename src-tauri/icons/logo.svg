<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Padding: icon shape inset ~50px to match macOS icon grid -->
  <!-- White rounded square background -->
  <rect x="50" y="50" width="412" height="412" rx="90" fill="#FFFFFF"/>

  <!-- Subtle border -->
  <rect x="52" y="52" width="408" height="408" rx="88" fill="none" stroke="#D0D0D0" stroke-width="1.5"/>

  <!-- Git branch structure (scaled and centered) -->
  <g stroke="#1A1A1A" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Main trunk -->
    <line x1="216" y1="370" x2="216" y2="160"/>

    <!-- Right branch splitting off -->
    <path d="M216 275 C216 275, 232 242, 310 225"/>
    <line x1="310" y1="225" x2="310" y2="160"/>

    <!-- Merge back -->
    <path d="M310 225 C310 258, 282 285, 216 302"/>
  </g>

  <!-- Branch dots (commits) -->
  <g>
    <circle cx="216" cy="160" r="18" fill="#1A1A1A"/>
    <circle cx="216" cy="370" r="15" fill="#444444"/>
    <circle cx="216" cy="302" r="14" fill="#333333"/>

    <circle cx="310" cy="160" r="18" fill="#1A1A1A"/>
    <circle cx="310" cy="225" r="14" fill="#333333"/>
  </g>

  <!-- Small arrow/pilot indicator -->
  <g transform="translate(216, 116)">
    <polygon points="0,-15 10,5 -10,5" fill="#1A1A1A"/>
  </g>
</svg>
