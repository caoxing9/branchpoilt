name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.2.0)"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

  build:
    needs: tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            arch: arm64
          - target: x86_64-apple-darwin
            runner: macos-13
            arch: x64

    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Re-sign app bundle to prevent "damaged" error
        run: |
          APP_PATH=$(find src-tauri/target/${{ matrix.target }}/release/bundle/macos -name "*.app" -maxdepth 1 | head -1)
          if [ -n "$APP_PATH" ]; then
            echo "Re-signing: $APP_PATH"
            codesign --force --deep --sign - "$APP_PATH"
          fi

      - name: Re-package DMG after re-signing
        run: |
          DMG_PATH=$(find src-tauri/target/${{ matrix.target }}/release/bundle/dmg -name "*.dmg" | head -1)
          APP_PATH=$(find src-tauri/target/${{ matrix.target }}/release/bundle/macos -name "*.app" -maxdepth 1 | head -1)
          if [ -n "$DMG_PATH" ] && [ -n "$APP_PATH" ]; then
            APP_NAME=$(basename "$APP_PATH")
            DMG_NAME=$(basename "$DMG_PATH")
            DMG_DIR=$(dirname "$DMG_PATH")
            TEMP_DIR=$(mktemp -d)

            # Remove old dmg and create new one with re-signed app
            rm -f "$DMG_PATH"
            cp -R "$APP_PATH" "$TEMP_DIR/$APP_NAME"
            ln -s /Applications "$TEMP_DIR/Applications"
            hdiutil create -volname "BranchPilot" -srcfolder "$TEMP_DIR" -ov -format UDZO "$DMG_DIR/$DMG_NAME"
            rm -rf "$TEMP_DIR"
            echo "Re-packaged DMG: $DMG_DIR/$DMG_NAME"
          fi

      - name: Upload DMG to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: BranchPilot v${{ inputs.version }}
          body: |
            ## BranchPilot v${{ inputs.version }}

            ### Download

            | Platform | File |
            |----------|------|
            | Apple Silicon (M1/M2/M3/M4) | `BranchPilot_*_aarch64.dmg` |
            | Intel Mac | `BranchPilot_*_x64.dmg` |

            ### First Launch

            Since this app is not signed with an Apple Developer certificate, macOS may block it.
            Right-click the app → **Open**, then click **Open** in the dialog. You only need to do this once.

            If you see "damaged and can't be opened", run:
            ```
            xattr -cr /Applications/BranchPilot.app
            ```
          draft: false
          prerelease: ${{ inputs.prerelease }}
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
